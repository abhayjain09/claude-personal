    Type: Custom::DataSeeding
    DependsOn:
    - AccountsTable
    - BillsTable
    - ServiceReqTable
    - OutagesTable
    Properties:
      ServiceToken: !GetAtt SeedDataFn.Arn
      AccountsTableName: !Ref AccountsTable
      BillsTableName: !Ref BillsTable
      ServiceReqTableName: !Ref ServiceReqTable
      OutagesTableName: !Ref OutagesTable
      SeedDataUrl: !Ref SeedDataUrl

  # Custom Resource for OpenAPI Upload
  OpenApiUpload:
    Type: Custom::OpenApiUpload
    DependsOn:
    - OpenApiBucket
    - UtilitiesApiStage
    Properties:
      ServiceToken: !GetAtt S3UploadFn.Arn
      BucketName: !Ref OpenApiBucket
      OpenApiSpecUrl: !Ref OpenApiSpecUrl
      ApiGatewayUrl: !Sub 'https://${UtilitiesApi}.execute-api.${AWS::Region}.amazonaws.com/dev'

Outputs:
  # Required output: API endpoint URL
  ApiUrl:
    Description: URL of the Utilities Customer Service API
    Value: !Sub 'https://${UtilitiesApi}.execute-api.${AWS::Region}.amazonaws.com/dev'

  # Required output: API key value (only when creating own key)
  ApiKey:
    Condition: CreateOwnApiKey
    Description: Value of the API Key for authentication
    Value: !GetAtt ApiKeyValueRetrieval.ApiKeyValue

  # ID of the effective API key (shared or own)
  ApiKeyId:
    Description: ID of the effective API key (shared or own)
    Value: !If [UseSharedApiKey, !Ref SharedApiKeyId, !Ref UtilitiesApiKey]

  # Required output: S3 location of OpenAPI spec
  OpenApiSpecS3Location:
    Description: S3 location of the uploaded OpenAPI specification
    Value: !GetAtt OpenApiUpload.S3Location

  # Additional outputs for reference
  AccountsTableName:
    Description: Name of the DynamoDB Accounts table
    Value: !Ref AccountsTable

  BillsTableName:
    Description: Name of the DynamoDB Bills table
    Value: !Ref BillsTable

  ServiceReqTableName:
    Description: Name of the DynamoDB Service Requests table
    Value: !Ref ServiceReqTable

  OutagesTableName:
    Description: Name of the DynamoDB Outages table
    Value: !Ref OutagesTable
