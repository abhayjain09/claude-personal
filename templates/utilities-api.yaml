AWSTemplateFormatVersion: '2010-09-09'
Description: 'Utilities Customer Service API - Demonstrates AI agent capabilities for energy/water utility services including accounts, bills, usage, outages, and service requests'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
    - Label:
        default: 'Data Configuration'
      Parameters:
      - SeedDataUrl
      - OpenApiSpecUrl
      - SharedApiKeyId
    ParameterLabels:
      SeedDataUrl:
        default: 'Seed Data URL'
      OpenApiSpecUrl:
        default: 'OpenAPI Specification URL'
      SharedApiKeyId:
        default: 'Shared API Key ID (Optional)'

Parameters:
  SeedDataUrl:
    Type: String
    Description: 'URL to fetch utilities seed data from (JSON format)'
    Default: ''
  OpenApiSpecUrl:
    Type: String
    Description: 'URL to fetch OpenAPI specification from (YAML format)'
    Default: ''
  SharedApiKeyId:
    Type: String
    Description: '(Optional) ID of a shared API key to use instead of creating a new one'
    Default: ''

Conditions:
  UseSharedApiKey: !Not [!Equals [!Ref SharedApiKeyId, '']]
  CreateOwnApiKey: !Equals [!Ref SharedApiKeyId, '']

Resources:
  # CloudWatch Log Groups
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}'
      RetentionInDays: 7
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-utilities-api'
      RetentionInDays: 7
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  # DynamoDB Tables
  AccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: accountId
        AttributeType: S
      - AttributeName: customerId
        AttributeType: S
      KeySchema:
      - AttributeName: accountId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: CustomerIndex
        KeySchema:
        - AttributeName: customerId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  BillsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: billId
        AttributeType: S
      - AttributeName: accountId
        AttributeType: S
      KeySchema:
      - AttributeName: billId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: AccountIndex
        KeySchema:
        - AttributeName: accountId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  ServiceReqTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: requestId
        AttributeType: S
      - AttributeName: accountId
        AttributeType: S
      KeySchema:
      - AttributeName: requestId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: AccountIndex
        KeySchema:
        - AttributeName: accountId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  OutagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: outageId
        AttributeType: S
      - AttributeName: status
        AttributeType: S
      KeySchema:
      - AttributeName: outageId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: StatusIndex
        KeySchema:
        - AttributeName: status
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  # Lambda Execution Role
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: CloudWatchLogsAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource: !Sub '${LambdaLogGroup.Arn}:*'
      - PolicyName: DynamoDBAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
            Resource:
            - !GetAtt AccountsTable.Arn
            - !Sub '${AccountsTable.Arn}/index/*'
            - !GetAtt BillsTable.Arn
            - !Sub '${BillsTable.Arn}/index/*'
            - !GetAtt ServiceReqTable.Arn
            - !Sub '${ServiceReqTable.Arn}/index/*'
            - !GetAtt OutagesTable.Arn
            - !Sub '${OutagesTable.Arn}/index/*'
      - PolicyName: XRayAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
            Resource: '*'
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  # API Key Retrieval Role
  ApiKeyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: ApiGatewayAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - apigateway:GET
            Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::/apikeys/*'
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  # Data Seeding Role
  SeedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DynamoDBSeedingAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            Resource:
            - !GetAtt AccountsTable.Arn
            - !GetAtt BillsTable.Arn
            - !GetAtt ServiceReqTable.Arn
            - !GetAtt OutagesTable.Arn
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete


  # Data Seeding Lambda
  SeedDataFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt SeedRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, BatchWriteCommand } = require('@aws-sdk/lib-dynamodb');
          const https = require('https');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          const sendResponse = async (event, context, status, data = {}) => {
            const responseBody = JSON.stringify({
              Status: status,
              Reason: data.Reason || `See CloudWatch Log Stream: ${context.logStreamName}`,
              PhysicalResourceId: context.logStreamName,
              StackId: event.StackId,
              RequestId: event.RequestId,
              LogicalResourceId: event.LogicalResourceId,
              Data: data
            });
            
            const parsedUrl = new URL(event.ResponseURL);
            const options = {
              hostname: parsedUrl.hostname,
              port: 443,
              path: parsedUrl.pathname + parsedUrl.search,
              method: 'PUT',
              headers: { 'Content-Type': '', 'Content-Length': responseBody.length }
            };
            
            return new Promise((resolve, reject) => {
              const request = https.request(options, (response) => resolve());
              request.on('error', reject);
              request.write(responseBody);
              request.end();
            });
          };

          const batchWriteItems = async (tableName, items) => {
            const batches = [];
            for (let i = 0; i < items.length; i += 25) {
              batches.push(items.slice(i, i + 25));
            }
            for (const batch of batches) {
              await docClient.send(new BatchWriteCommand({
                RequestItems: { [tableName]: batch.map(item => ({ PutRequest: { Item: item } })) }
              }));
            }
          };

          const getDefaultData = () => ({
            accounts: [
              { accountId: 'UTL-001', customerId: 'CUST-001', serviceAddress: '123 Main St, Seattle, WA 98101', meterNumber: 'MTR-001', serviceType: 'electric', accountStatus: 'active', enrolledInAutoPay: true, paperlessBilling: true },
              { accountId: 'UTL-002', customerId: 'CUST-002', serviceAddress: '456 Oak Ave, Portland, OR 97201', meterNumber: 'MTR-002', serviceType: 'gas', accountStatus: 'active', enrolledInAutoPay: false, paperlessBilling: true },
              { accountId: 'UTL-003', customerId: 'CUST-003', serviceAddress: '789 Pine Rd, Bellevue, WA 98004', meterNumber: 'MTR-003', serviceType: 'combined', accountStatus: 'active', enrolledInAutoPay: true, paperlessBilling: false },
              { accountId: 'UTL-004', customerId: 'CUST-004', serviceAddress: '321 Elm St, Tacoma, WA 98402', meterNumber: 'MTR-004', serviceType: 'water', accountStatus: 'suspended', enrolledInAutoPay: false, paperlessBilling: false, suspendReason: 'Payment overdue' }
            ],
            bills: [
              { billId: 'BILL-001', accountId: 'UTL-001', billingPeriodStart: '2024-01-01', billingPeriodEnd: '2024-01-31', amountDue: 145.67, dueDate: '2024-02-15', status: 'current', usage: 850, usageUnit: 'kWh', previousBalance: 0, payments: 0 },
              { billId: 'BILL-002', accountId: 'UTL-001', billingPeriodStart: '2023-12-01', billingPeriodEnd: '2023-12-31', amountDue: 0, dueDate: '2024-01-15', status: 'paid', usage: 920, usageUnit: 'kWh', previousBalance: 0, payments: 168.45 },
              { billId: 'BILL-003', accountId: 'UTL-002', billingPeriodStart: '2024-01-01', billingPeriodEnd: '2024-01-31', amountDue: 78.90, dueDate: '2024-02-15', status: 'current', usage: 45, usageUnit: 'therms', previousBalance: 0, payments: 0 },
              { billId: 'BILL-004', accountId: 'UTL-003', billingPeriodStart: '2024-01-01', billingPeriodEnd: '2024-01-31', amountDue: 234.56, dueDate: '2024-02-15', status: 'current', usage: 1200, usageUnit: 'kWh', previousBalance: 0, payments: 0 },
              { billId: 'BILL-005', accountId: 'UTL-004', billingPeriodStart: '2024-01-01', billingPeriodEnd: '2024-01-31', amountDue: 156.78, dueDate: '2024-02-15', status: 'past-due', usage: 8500, usageUnit: 'gallons', previousBalance: 89.45, payments: 0 }
            ],
            serviceRequests: [
              { requestId: 'SVC-001', accountId: 'UTL-001', requestType: 'start', serviceAddress: '123 Main St, Seattle, WA 98101', requestedDate: '2024-02-01', status: 'completed', createdAt: '2024-01-15T10:00:00Z', completedAt: '2024-02-01T09:00:00Z' },
              { requestId: 'SVC-002', accountId: 'UTL-002', requestType: 'transfer', serviceAddress: '789 New St, Portland, OR 97202', requestedDate: '2024-02-15', status: 'scheduled', createdAt: '2024-02-01T14:00:00Z' },
              { requestId: 'SVC-003', accountId: 'UTL-003', requestType: 'stop', serviceAddress: '789 Pine Rd, Bellevue, WA 98004', requestedDate: '2024-03-01', status: 'pending', createdAt: '2024-02-10T11:00:00Z' },
              { requestId: 'SVC-004', accountId: 'UTL-004', requestType: 'reconnect', serviceAddress: '321 Elm St, Tacoma, WA 98402', requestedDate: '2024-02-20', status: 'pending', createdAt: '2024-02-15T09:00:00Z', notes: 'Payment arrangement made' }
            ],
            outages: [
              { outageId: 'OUT-001', reportedBy: 'CUST-001', serviceAddress: '123 Main St, Seattle, WA 98101', outageType: 'power', status: 'investigating', estimatedRestoration: '2024-02-15T18:00:00Z', createdAt: '2024-02-15T10:00:00Z', affectedCustomers: 250, description: 'Transformer failure in downtown area' },
              { outageId: 'OUT-002', reportedBy: 'system', serviceAddress: 'North Seattle Region', outageType: 'power', status: 'crew-dispatched', estimatedRestoration: '2024-02-15T20:00:00Z', createdAt: '2024-02-15T08:30:00Z', affectedCustomers: 1500, description: 'Storm damage to power lines' },
              { outageId: 'OUT-003', reportedBy: 'CUST-003', serviceAddress: '789 Pine Rd, Bellevue, WA 98004', outageType: 'gas', status: 'resolved', createdAt: '2024-02-14T14:00:00Z', resolvedAt: '2024-02-14T16:30:00Z', description: 'Gas leak repaired' },
              { outageId: 'OUT-004', reportedBy: 'CUST-002', serviceAddress: '456 Oak Ave, Portland, OR 97201', outageType: 'water', status: 'confirmed', estimatedRestoration: '2024-02-15T22:00:00Z', createdAt: '2024-02-15T12:00:00Z', affectedCustomers: 75, description: 'Water main break' }
            ]
          });

          exports.handler = async (event, context) => {
            console.log('Event:', JSON.stringify(event, null, 2));
            try {
              if (event.RequestType === 'Delete' || event.RequestType === 'Update') {
                await sendResponse(event, context, 'SUCCESS', {});
                return;
              }
              
              const { AccountsTableName, BillsTableName, ServiceReqTableName, OutagesTableName } = event.ResourceProperties;
              const data = getDefaultData();
              
              await batchWriteItems(AccountsTableName, data.accounts);
              await batchWriteItems(BillsTableName, data.bills);
              await batchWriteItems(ServiceReqTableName, data.serviceRequests);
              await batchWriteItems(OutagesTableName, data.outages);
              
              await sendResponse(event, context, 'SUCCESS', { Message: 'Data seeded successfully' });
            } catch (error) {
              console.error('Error:', error);
              await sendResponse(event, context, 'FAILED', { Reason: error.message });
            }
          };
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete


  # Lambda Functions for API Operations
  GetAccountFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ACCOUNTS_TABLE: !Ref AccountsTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, QueryCommand, GetCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
            try {
              const accountId = event.pathParameters?.accountId;
              const customerId = event.queryStringParameters?.customerId;
              
              if (accountId) {
                const result = await docClient.send(new GetCommand({
                  TableName: process.env.ACCOUNTS_TABLE,
                  Key: { accountId }
                }));
                if (!result.Item) {
                  return { statusCode: 404, headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ error: 'Account not found', code: 'NOT_FOUND' }) };
                }
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ account: result.Item }) };
              }
              
              if (customerId) {
                const result = await docClient.send(new QueryCommand({
                  TableName: process.env.ACCOUNTS_TABLE,
                  IndexName: 'CustomerIndex',
                  KeyConditionExpression: 'customerId = :cid',
                  ExpressionAttributeValues: { ':cid': customerId }
                }));
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ accounts: result.Items || [], count: result.Items?.length || 0 }) };
              }
              
              return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Missing accountId or customerId parameter', code: 'MISSING_PARAMETER' }) };
            } catch (error) {
              console.error('Error:', error);
              return { statusCode: 500, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Internal server error', details: error.message }) };
            }
          };
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  GetBillsFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          BILLS_TABLE: !Ref BillsTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, QueryCommand, GetCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
            try {
              const billId = event.pathParameters?.billId;
              const accountId = event.queryStringParameters?.accountId;
              
              if (billId) {
                const result = await docClient.send(new GetCommand({
                  TableName: process.env.BILLS_TABLE,
                  Key: { billId }
                }));
                if (!result.Item) {
                  return { statusCode: 404, headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ error: 'Bill not found', code: 'NOT_FOUND' }) };
                }
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ bill: result.Item }) };
              }
              
              if (accountId) {
                const result = await docClient.send(new QueryCommand({
                  TableName: process.env.BILLS_TABLE,
                  IndexName: 'AccountIndex',
                  KeyConditionExpression: 'accountId = :aid',
                  ExpressionAttributeValues: { ':aid': accountId }
                }));
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ bills: result.Items || [], count: result.Items?.length || 0 }) };
              }
              
              return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Missing billId or accountId parameter', code: 'MISSING_PARAMETER' }) };
            } catch (error) {
              console.error('Error:', error);
              return { statusCode: 500, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Internal server error', details: error.message }) };
            }
          };
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  GetUsageFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ACCOUNTS_TABLE: !Ref AccountsTable
          BILLS_TABLE: !Ref BillsTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, GetCommand, QueryCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
            try {
              const accountId = event.pathParameters?.accountId;
              
              if (!accountId) {
                return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ error: 'Missing accountId parameter', code: 'MISSING_PARAMETER' }) };
              }
              
              const accountResult = await docClient.send(new GetCommand({
                TableName: process.env.ACCOUNTS_TABLE,
                Key: { accountId }
              }));
              
              if (!accountResult.Item) {
                return { statusCode: 404, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ error: 'Account not found', code: 'NOT_FOUND' }) };
              }
              
              const billsResult = await docClient.send(new QueryCommand({
                TableName: process.env.BILLS_TABLE,
                IndexName: 'AccountIndex',
                KeyConditionExpression: 'accountId = :aid',
                ExpressionAttributeValues: { ':aid': accountId },
                Limit: 12
              }));
              
              const usageHistory = (billsResult.Items || []).map(bill => ({
                period: `${bill.billingPeriodStart} to ${bill.billingPeriodEnd}`,
                usage: bill.usage,
                usageUnit: bill.usageUnit,
                amount: bill.amountDue
              }));
              
              const usage = {
                accountId: accountResult.Item.accountId,
                serviceType: accountResult.Item.serviceType,
                meterNumber: accountResult.Item.meterNumber,
                usageHistory
              };
              
              return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usage }) };
            } catch (error) {
              console.error('Error:', error);
              return { statusCode: 500, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Internal server error', details: error.message }) };
            }
          };
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete


  GetOutagesFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          OUTAGES_TABLE: !Ref OutagesTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, QueryCommand, GetCommand, ScanCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
            try {
              const outageId = event.pathParameters?.outageId;
              const status = event.queryStringParameters?.status;
              
              if (outageId) {
                const result = await docClient.send(new GetCommand({
                  TableName: process.env.OUTAGES_TABLE,
                  Key: { outageId }
                }));
                if (!result.Item) {
                  return { statusCode: 404, headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ error: 'Outage not found', code: 'NOT_FOUND' }) };
                }
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ outage: result.Item }) };
              }
              
              if (status) {
                const result = await docClient.send(new QueryCommand({
                  TableName: process.env.OUTAGES_TABLE,
                  IndexName: 'StatusIndex',
                  KeyConditionExpression: '#status = :status',
                  ExpressionAttributeNames: { '#status': 'status' },
                  ExpressionAttributeValues: { ':status': status }
                }));
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ outages: result.Items || [], count: result.Items?.length || 0 }) };
              }
              
              // Return all active outages by default
              const result = await docClient.send(new ScanCommand({
                TableName: process.env.OUTAGES_TABLE,
                FilterExpression: '#status <> :resolved',
                ExpressionAttributeNames: { '#status': 'status' },
                ExpressionAttributeValues: { ':resolved': 'resolved' }
              }));
              return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ outages: result.Items || [], count: result.Items?.length || 0 }) };
            } catch (error) {
              console.error('Error:', error);
              return { statusCode: 500, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Internal server error', details: error.message }) };
            }
          };
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  ReportOutageFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          OUTAGES_TABLE: !Ref OutagesTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, PutCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
            try {
              const body = JSON.parse(event.body || '{}');
              const { customerId, serviceAddress, outageType, description } = body;
              
              const missing = [];
              if (!customerId) missing.push('customerId');
              if (!serviceAddress) missing.push('serviceAddress');
              if (!outageType) missing.push('outageType');
              
              if (missing.length > 0) {
                return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ error: 'Missing required fields', code: 'MISSING_FIELDS', details: missing.join(', ') }) };
              }
              
              const validTypes = ['power', 'gas', 'water'];
              if (!validTypes.includes(outageType)) {
                return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ error: 'Invalid outage type', code: 'INVALID_TYPE', details: `Must be one of: ${validTypes.join(', ')}` }) };
              }
              
              const outageId = `OUT-${Math.floor(Math.random() * 1000000).toString().padStart(6, '0')}`;
              const outage = {
                outageId,
                reportedBy: customerId,
                serviceAddress,
                outageType,
                description: description || 'Customer reported outage',
                status: 'reported',
                createdAt: new Date().toISOString()
              };
              
              await docClient.send(new PutCommand({ TableName: process.env.OUTAGES_TABLE, Item: outage }));
              
              return { statusCode: 201, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ outage, message: 'Outage reported successfully' }) };
            } catch (error) {
              console.error('Error:', error);
              return { statusCode: 500, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Internal server error', details: error.message }) };
            }
          };
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  GetSvcReqFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          SERVICE_REQ_TABLE: !Ref ServiceReqTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, QueryCommand, GetCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
            try {
              const requestId = event.pathParameters?.requestId;
              const accountId = event.queryStringParameters?.accountId;
              
              if (requestId) {
                const result = await docClient.send(new GetCommand({
                  TableName: process.env.SERVICE_REQ_TABLE,
                  Key: { requestId }
                }));
                if (!result.Item) {
                  return { statusCode: 404, headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ error: 'Service request not found', code: 'NOT_FOUND' }) };
                }
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ serviceRequest: result.Item }) };
              }
              
              if (accountId) {
                const result = await docClient.send(new QueryCommand({
                  TableName: process.env.SERVICE_REQ_TABLE,
                  IndexName: 'AccountIndex',
                  KeyConditionExpression: 'accountId = :aid',
                  ExpressionAttributeValues: { ':aid': accountId }
                }));
                return { statusCode: 200, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ serviceRequests: result.Items || [], count: result.Items?.length || 0 }) };
              }
              
              return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Missing requestId or accountId parameter', code: 'MISSING_PARAMETER' }) };
            } catch (error) {
              console.error('Error:', error);
