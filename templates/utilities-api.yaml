                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetBillsFn.Arn}/invocations'
          /bills/{billId}:
            get:
              operationId: 'getBillById'
              summary: 'Get bill by ID'
              security:
              - api_key: []
              parameters:
              - name: billId
                in: path
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'Bill details'
                '404':
                  description: 'Bill not found'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetBillsFn.Arn}/invocations'
          /outages:
            get:
              operationId: 'getOutages'
