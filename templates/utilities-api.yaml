  # Custom Resource Lambda Role for S3 Upload
  S3UploadRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: S3Access
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:PutObject
            - s3:DeleteObject
            - s3:GetObject
            - s3:GetObjectVersion
            - s3:ListBucket
            Resource:
            - !Sub '${OpenApiBucket.Arn}'
            - !Sub '${OpenApiBucket.Arn}/*'
          - Effect: Allow
            Action:
            - s3:GetObject
            Resource: '*'
          - Effect: Allow
            Action:
            - cloudformation:DescribeStacks
            Resource: !Ref 'AWS::StackId'
