    DeletionPolicy: Delete


  # API Gateway REST API
  UtilitiesApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-UtilitiesAPI'
      Description: 'Utilities Customer Service API for AI agent demonstrations'
      ApiKeySourceType: HEADER
      Body:
        openapi: '3.0.1'
        info:
          title: 'Utilities Customer Service API'
          description: 'API for managing utility operations including accounts, bills, usage, outages, and service requests'
          version: '1.0.0'
        paths:
          /accounts:
            get:
              operationId: 'getAccountsByCustomer'
              summary: 'Get accounts by customer ID'
              security:
              - api_key: []
              parameters:
              - name: customerId
                in: query
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'List of accounts'
                '400':
                  description: 'Missing required parameter'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetAccountFn.Arn}/invocations'
          /accounts/{accountId}:
            get:
              operationId: 'getAccountById'
              summary: 'Get account by ID'
              security:
              - api_key: []
              parameters:
              - name: accountId
                in: path
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'Account details'
                '404':
                  description: 'Account not found'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetAccountFn.Arn}/invocations'
          /accounts/{accountId}/usage:
            get:
              operationId: 'getUsageByAccount'
              summary: 'Get usage history for an account'
              security:
              - api_key: []
              parameters:
              - name: accountId
                in: path
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'Usage history'
                '404':
                  description: 'Account not found'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetUsageFn.Arn}/invocations'
          /bills:
            get:
              operationId: 'getBillsByAccount'
              summary: 'Get bills by account ID'
              security:
              - api_key: []
              parameters:
              - name: accountId
                in: query
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'List of bills'
                '400':
                  description: 'Missing required parameter'
                '401':
                  description: 'Unauthorized - API key required'
