  CreateSvcReqFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          SERVICE_REQ_TABLE: !Ref ServiceReqTable
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, PutCommand } = require('@aws-sdk/lib-dynamodb');

          const client = new DynamoDBClient({});
          const docClient = DynamoDBDocumentClient.from(client);

          exports.handler = async (event) => {
            try {
              const body = JSON.parse(event.body || '{}');
              const { accountId, requestType, serviceAddress, requestedDate, notes } = body;
              
              const missing = [];
              if (!accountId) missing.push('accountId');
              if (!requestType) missing.push('requestType');
              if (!serviceAddress) missing.push('serviceAddress');
              if (!requestedDate) missing.push('requestedDate');
              
              if (missing.length > 0) {
                return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ error: 'Missing required fields', code: 'MISSING_FIELDS', details: missing.join(', ') }) };
              }
              
              const validTypes = ['start', 'stop', 'transfer', 'reconnect'];
              if (!validTypes.includes(requestType)) {
                return { statusCode: 400, headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ error: 'Invalid request type', code: 'INVALID_TYPE', details: `Must be one of: ${validTypes.join(', ')}` }) };
              }
              
              const requestId = `SVC-${Math.floor(Math.random() * 1000000).toString().padStart(6, '0')}`;
              const serviceRequest = {
                requestId,
                accountId,
                requestType,
                serviceAddress,
                requestedDate,
                status: 'pending',
                createdAt: new Date().toISOString()
              };
              
              if (notes) serviceRequest.notes = notes;
              
              await docClient.send(new PutCommand({ TableName: process.env.SERVICE_REQ_TABLE, Item: serviceRequest }));
              
              return { statusCode: 201, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ serviceRequest, message: 'Service request created successfully' }) };
            } catch (error) {
              console.error('Error:', error);
              return { statusCode: 500, headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ error: 'Internal server error', details: error.message }) };
            }
          };
      Tags:
