  # API Gateway REST API
  TelecomApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-TelecomAPI'
      Description: 'Telecom Customer Service API for AI agent demonstrations'
      ApiKeySourceType: HEADER
      Body:
        openapi: '3.0.1'
        info:
          title: 'Telecom Customer Service API'
          description: 'API for managing telecom operations including accounts, usage, outages, and troubleshooting'
          version: '1.0.0'
        paths:
          /accounts:
            get:
              operationId: 'getAccountsByCustomer'
              summary: 'Get accounts by customer ID'
              security:
              - api_key: []
              parameters:
              - name: customerId
                in: query
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'List of accounts'
                '400':
                  description: 'Missing required parameter'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetAccountFn.Arn}/invocations'
          /accounts/{accountId}:
            get:
              operationId: 'getAccountById'
              summary: 'Get account by ID'
              security:
              - api_key: []
              parameters:
              - name: accountId
                in: path
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'Account details'
                '404':
                  description: 'Account not found'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetAccountFn.Arn}/invocations'
          /accounts/{accountId}/usage:
            get:
              operationId: 'getUsageByAccount'
              summary: 'Get data usage for an account'
              security:
              - api_key: []
              parameters:
              - name: accountId
                in: path
                required: true
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'Usage details'
                '404':
                  description: 'Account not found'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetUsageFn.Arn}/invocations'
          /outages:
            get:
              operationId: 'getOutages'
              summary: 'Get service outages'
              security:
              - api_key: []
              parameters:
              - name: status
                in: query
                required: false
                schema:
                  type: 'string'
              responses:
                '200':
                  description: 'List of outages'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetOutagesFn.Arn}/invocations'
            post:
              operationId: 'reportOutage'
              summary: 'Report a service outage'
              security:
              - api_key: []
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: 'object'
                      required:
                      - customerId
                      - serviceAddress
                      - outageType
              responses:
                '201':
                  description: 'Outage reported'
                '400':
                  description: 'Invalid request'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReportOutageFn.Arn}/invocations'
          /outages/{outageId}:
