              security:
              - api_key: []
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: 'object'
                      required:
                      - customerId
                      - issueType
                      - description
              responses:
                '201':
                  description: 'Ticket created'
                '400':
                  description: 'Invalid request'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateTicketFn.Arn}/invocations'
          /troubleshooting/{ticketId}:
            get:
              operationId: 'getTicketById'
