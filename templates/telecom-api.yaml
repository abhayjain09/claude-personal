              responses:
                '200':
                  description: 'List of devices'
                '400':
                  description: 'Missing required parameter'
                '401':
                  description: 'Unauthorized - API key required'
              x-amazon-apigateway-integration:
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetDevicesFn.Arn}/invocations'
          /devices/{deviceId}:
