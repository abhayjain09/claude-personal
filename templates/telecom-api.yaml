  # Custom Resource Lambda for API Key Retrieval
  ApiKeyFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt ApiKeyRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          http = urllib3.PoolManager()
          apigateway = boto3.client('apigateway')

          def send_response(event, context, status, data=None, physical_resource_id=None, reason=None):
              response_body = {
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }
              
              logger.info(f'Response body: {json.dumps(response_body)}')
              
              try:
                  response = http.request(
                      'PUT',
                      event['ResponseURL'],
                      body=json.dumps(response_body).encode('utf-8'),
                      headers={'Content-Type': ''}
                  )
                  logger.info(f'CloudFormation response status: {response.status}')
              except Exception as e:
                  logger.error(f'Error sending response: {str(e)}')
                  raise

          def handler(event, context):
              logger.info(f'Event: {json.dumps(event)}')
              
              try:
                  request_type = event['RequestType']
                  
                  if request_type == 'Delete':
                      logger.info('Delete request - no action needed')
                      send_response(event, context, 'SUCCESS', {})
                      return
                  
                  api_key_id = event['ResourceProperties']['ApiKeyId']
                  logger.info(f'Retrieving API key value for: {api_key_id}')
                  
                  response = apigateway.get_api_key(
                      apiKey=api_key_id,
                      includeValue=True
                  )
                  
                  api_key_value = response['value']
                  logger.info('Successfully retrieved API key value')
                  
                  send_response(
                      event, 
                      context, 
                      'SUCCESS', 
                      data={'ApiKeyValue': api_key_value},
                      physical_resource_id=api_key_id
                  )
                  
              except Exception as e:
                  logger.error(f'Error retrieving API key: {str(e)}')
                  send_response(event, context, 'FAILED', reason=str(e))
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  # Custom Resource Lambda for S3 Upload
  S3UploadFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt S3UploadRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          http = urllib3.PoolManager()
          s3 = boto3.client('s3')

          def send_response(event, context, status, data=None, physical_resource_id=None, reason=None):
              response_body = {
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              }
              
              logger.info(f'Response body: {json.dumps(response_body)}')
              
              try:
                  response = http.request(
                      'PUT',
                      event['ResponseURL'],
                      body=json.dumps(response_body).encode('utf-8'),
                      headers={'Content-Type': ''}
                  )
                  logger.info(f'CloudFormation response status: {response.status}')
              except Exception as e:
                  logger.error(f'Error sending response: {str(e)}')
                  raise

          def handler(event, context):
              logger.info(f'Event: {json.dumps(event)}')
              
              try:
                  request_type = event['RequestType']
                  
                  if request_type == 'Delete':
                      logger.info('Delete request - removing OpenAPI spec from S3')
                      try:
                          bucket_name = event['ResourceProperties']['BucketName']
                          s3.delete_object(Bucket=bucket_name, Key='telecom-api-openapi.yaml')
                          logger.info('Successfully deleted OpenAPI spec from S3')
                      except Exception as e:
                          logger.warning(f'Error deleting from S3: {str(e)}')
                      
                      send_response(event, context, 'SUCCESS', {})
                      return
                  
                  bucket_name = event['ResourceProperties']['BucketName']
                  openapi_url = event['ResourceProperties']['OpenApiSpecUrl']
                  api_gateway_url = event['ResourceProperties']['ApiGatewayUrl']
                  
                  logger.info(f'Bucket: {bucket_name}, OpenAPI URL: {openapi_url}')
                  
                  if openapi_url.startswith('s3://'):
                      parts = openapi_url[5:].split('/', 1)
                      source_bucket = parts[0]
                      source_key = parts[1] if len(parts) > 1 else ''
                      
                      logger.info(f'Fetching from S3: bucket={source_bucket}, key={source_key}')
                      response = s3.get_object(Bucket=source_bucket, Key=source_key)
                      openapi_content = response['Body'].read().decode('utf-8')
                  else:
                      response = http.request('GET', openapi_url)
                      if response.status != 200:
                          raise Exception(f'Failed to fetch OpenAPI spec: HTTP {response.status}')
                      openapi_content = response.data.decode('utf-8')
                  
                  logger.info(f'Fetched OpenAPI spec ({len(openapi_content)} bytes)')
                  
                  updated_content = openapi_content.replace('${API_GATEWAY_URL}', api_gateway_url)
                  
                  s3.put_object(
                      Bucket=bucket_name,
                      Key='telecom-api-openapi.yaml',
                      Body=updated_content.encode('utf-8'),
                      ContentType='application/x-yaml'
                  )
                  
                  s3_location = f's3://{bucket_name}/telecom-api-openapi.yaml'
                  logger.info(f'Successfully uploaded OpenAPI spec to {s3_location}')
                  
                  send_response(
                      event, context, 'SUCCESS',
                      data={'S3Location': s3_location},
                      physical_resource_id=s3_location
                  )
                  
              except Exception as e:
                  logger.error(f'Error uploading OpenAPI spec: {str(e)}')
                  send_response(event, context, 'FAILED', reason=str(e))
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
    DeletionPolicy: Delete

  # Custom Resource for API Key Value Retrieval (only when creating own key)
  ApiKeyValueRetrieval:
    Type: Custom::ApiKeyValueRetrieval
    Condition: CreateOwnApiKey
    DependsOn:
    - TelecomApiKey
    - TelecomApiUsagePlanKey
    Properties:
      ServiceToken: !GetAtt ApiKeyFn.Arn
      ApiKeyId: !Ref TelecomApiKey

  # Custom Resource for Data Seeding
  DataSeeding:
    Type: Custom::DataSeeding
    DependsOn:
    - AccountsTable
    - OutagesTable
    - TicketsTable
    - DevicesTable
    Properties:
      ServiceToken: !GetAtt SeedDataFn.Arn
      AccountsTableName: !Ref AccountsTable
      OutagesTableName: !Ref OutagesTable
      TicketsTableName: !Ref TicketsTable
      DevicesTableName: !Ref DevicesTable
      SeedDataUrl: !Ref SeedDataUrl

  # Custom Resource for OpenAPI Upload
  OpenApiUpload:
    Type: Custom::OpenApiUpload
    DependsOn:
    - OpenApiBucket
    - TelecomApiStage
    Properties:
      ServiceToken: !GetAtt S3UploadFn.Arn
      BucketName: !Ref OpenApiBucket
      OpenApiSpecUrl: !Ref OpenApiSpecUrl
      ApiGatewayUrl: !Sub 'https://${TelecomApi}.execute-api.${AWS::Region}.amazonaws.com/dev'

Outputs:
  # Required output: API endpoint URL
  ApiUrl:
    Description: URL of the Telecom Customer Service API
    Value: !Sub 'https://${TelecomApi}.execute-api.${AWS::Region}.amazonaws.com/dev'

  # Required output: API key value for authentication (own key when not using shared)
  ApiKey:
    Condition: CreateOwnApiKey
    Description: Value of the API Key for authentication
    Value: !GetAtt ApiKeyValueRetrieval.ApiKeyValue

  # ID of the effective API key (shared or own)
  ApiKeyId:
    Description: ID of the effective API key (shared or own)
    Value: !If [UseSharedApiKey, !Ref SharedApiKeyId, !Ref TelecomApiKey]

  # Required output: S3 location of OpenAPI spec
  OpenApiSpecS3Location:
    Description: S3 location of the uploaded OpenAPI specification
    Value: !GetAtt OpenApiUpload.S3Location

  # Additional outputs for reference
  AccountsTableName:
    Description: Name of the DynamoDB Accounts table
    Value: !Ref AccountsTable

  OutagesTableName:
    Description: Name of the DynamoDB Outages table
    Value: !Ref OutagesTable

  TicketsTableName:
    Description: Name of the DynamoDB Tickets table
    Value: !Ref TicketsTable

  DevicesTableName:
    Description: Name of the DynamoDB Devices table
    Value: !Ref DevicesTable
