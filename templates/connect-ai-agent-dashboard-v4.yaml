AWSTemplateFormatVersion: '2010-09-09'
Description: |
  AWS CloudFormation template to deploy an AWS CloudWatch Dashboard for Connect AI Agent Logging - Version 2025-08-01

Metadata:
  Version: "2025-08-18"
  Features: "Tool Usage Monitoring, Self-Service Analytics, Intent Tracking, LLM Performance"

# AWS CLI command to deploy template by creating a new log group with custom name:
# aws cloudformation deploy --template-file connect-ai-agent-dashboard-v4.yaml --stack-name my-caia-dashboard --parameter-overrides AmazonCAIAAssistantARN="arn:aws:wisdom:us-east-1:123456789012:assistant/your-assistant-id" CreateNewLogGroup="yes" LogGroupName="/aws/connect/my-custom-log-group" --capabilities CAPABILITY_IAM

# AWS CLI command to deploy template using an existing log group name:
# aws cloudformation deploy --template-file connect-ai-agent-dashboard-v4.yaml --stack-name my-caia-dashboard --parameter-overrides AmazonCAIAAssistantARN="arn:aws:wisdom:us-east-1:123456789012:assistant/your-assistant-id" CreateNewLogGroup="no" LogGroupName="/aws/connect/existing-log-group" --capabilities CAPABILITY_IAM
Parameters:
  AmazonCAIAAssistantARN:
    Type: String
    Description: Connect AI Assistant ARN (REQUIRED)
    AllowedPattern: '^arn:aws:wisdom:[a-z0-9-]+:[0-9]{12}:assistant/[a-zA-Z0-9-]+$'
  CreateNewLogGroup:
    Type: String
    Description: Create new log group? (yes/no) - ('no' uses an existing Log group name)
    Default: "yes"
    AllowedValues: ["yes", "no"]
  LogGroupName:
    Type: String
    Description: "Enter log group name (REQUIRED). For new log groups: enter desired name or 'auto' for /aws/connect/caia-{unique-id}. For existing log groups: enter exact existing name."
    MinLength: 1
    Default: "auto"
    ConstraintDescription: LogGroupName cannot be empty

  LogRetentionDays:
    Type: Number
    Default: 365
    Description: Number of days to retain CloudWatch logs
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

Conditions:
  ShouldCreateLogGroup: !Equals [!Ref CreateNewLogGroup, "yes"]
  UseAutoGeneratedName: !Equals [!Ref LogGroupName, "auto"]

Resources:
  # CloudWatch Log Group - Stores Connect AI Agent event logs
  CAIALogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ShouldCreateLogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !If
      - UseAutoGeneratedName
      - !Sub
        - '/aws/connect/caia-${UUID}'
        - UUID: !Select [4, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId]]]]
      - !Ref LogGroupName
      RetentionInDays: !Ref LogRetentionDays

  # Resource Policy - Allows CloudWatch Logs delivery service to write to log group
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
  CAIALogGroupResourcePolicy:
    Type: AWS::Logs::ResourcePolicy
    Properties:
      PolicyName: !Sub
      - "CAIALogDeliveryPolicy-${UUID}"
      - UUID: !Select [4, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId]]]]
      PolicyDocument: !Sub
      - |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Service": "delivery.logs.amazonaws.com"
              },
              "Action": [
                "logs:PutLogEvents",
                "logs:CreateLogStream"
              ],
              "Resource": "${LogGroupArn}:*"
            }
          ]
        }
      - LogGroupArn: !If
        - ShouldCreateLogGroup
        - !GetAtt CAIALogGroup.Arn
        - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}"
  CAIADashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub
      - 'connect-ai-agent-dashboard-${UUID}'
      - UUID: !Select [4, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId]]]]
      DashboardBody: !Sub
      - |
        {
          "widgets": [
            {
              "height": 8,
              "width": 24,
              "x": 0,
              "y": 0,
              "type": "text",
              "properties": {
                "markdown": "# Connect AI Agent Dashboard - Real-time Assistant Monitoring\n**Version**: 2025-08-18  \n**Assistant**: ${AmazonCAIAAssistantARN} \n### Project Description\nThis dashboard provides real-time monitoring of Connect AI Agent assistant performance and activity. Track intent triggers, recommendations, LLM invocations, tool usage, and assistant interactions to optimize customer service delivery.\n\n### Key Performance Indicators\n* **Session Management**: Monitor session creation and polling activity\n* **Intent Detection**: Track customer intent recognition accuracy and frequency  \n* **LLM Operations**: Monitor large language model invocations and performance\n* **Recommendations**: Track assistant recommendation delivery and effectiveness\n* **Self-Service**: Monitor customer self-service interactions and tool usage\n* **Tool Usage**: Track ESCALATION, QUESTION, CONVERSATION, and COMPLETE tool invocations\n* **Agentic Processing**: Monitor orchestration agent reasoning and tool planning\n* **Feedback Loop**: Track recommendation usefulness and result feedback\n\n### Tool Usage Monitoring\nThe dashboard now parses the `completion` field from `TRANSCRIPT_SELF_SERVICE_MESSAGE` events to track:\n* **ESCALATION**: When customers are transferred to human agents\n* **QUESTION**: When the assistant searches the knowledge base\n* **CONVERSATION**: When the assistant continues casual conversation\n* **COMPLETE**: When conversations are ended by the assistant\n\n### Supported Event Types\n`TRANSCRIPT_AGENTIC_MESSAGE`, `TRANSCRIPT_CREATE_SESSION`, `TRANSCRIPT_INTENT_TRIGGERING_REFERENCE`, `TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION`, `TRANSCRIPT_QUERY_ASSISTANT`, `TRANSCRIPT_RECOMMENDATION`, `TRANSCRIPT_RESULT_FEEDBACK`, `TRANSCRIPT_SELF_SERVICE_MESSAGE`, `TRANSCRIPT_SESSION_POLLED`, `TRANSCRIPT_TRIGGER_DETECTION_MODEL_INVOCATION`, `TRANSCRIPT_UTTERANCE`\n\n### Quick Links\n* [Amazon Connect Console](https://console.aws.amazon.com/connect/) | [Connect AI Agent Monitoring Documentation](https://docs.aws.amazon.com/connect/latest/adminguide/monitor-q-assistants-cloudwatch.html) | [CloudWatch Logs](https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/${LogGroupRef}) | [AWS Support](https://console.aws.amazon.com/support/)\n---",
                "background": "transparent"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 8,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, session_name\n| filter event_type = 'TRANSCRIPT_CREATE_SESSION'\n| sort @timestamp desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "New Sessions Created",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 6,
              "y": 8,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, intent, intent_id\n| filter event_type = 'TRANSCRIPT_INTENT_TRIGGERING_REFERENCE'\n| sort @timestamp desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Intent Triggers",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 8,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, recommendation_id, intent_clicked\n| filter event_type = 'TRANSCRIPT_RECOMMENDATION'\n| sort @timestamp desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Recommendations",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 18,
              "y": 8,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, is_valid_trigger, issue_probability\n| filter event_type = 'TRANSCRIPT_TRIGGER_DETECTION_MODEL_INVOCATION'\n| sort @timestamp desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Trigger Detection",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 14,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_message_id, parsed_response\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE'\n| sort @timestamp desc\n| limit 15",
                "region": "${AWS::Region}",
                "title": "Self-Service Messages",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 14,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, event_type\n| stats count() by event_type\n| sort count desc",
                "region": "${AWS::Region}",
                "title": "Event Type Distribution",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 18,
              "y": 14,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, completion\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion)\n| filter completion like /toolUse/\n| parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/\n| stats count() by tool_name\n| sort count desc",
                "region": "${AWS::Region}",
                "title": "Tool Usage Distribution",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 20,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, completion\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion)\n| filter completion like /toolUse/\n| parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/\n| stats count() by bin(5m), tool_name",
                "region": "${AWS::Region}",
                "title": "Tool Usage Over Time (5min intervals)",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 20,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, completion, utterance\n| filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion)\n| filter completion like /toolUse/\n| parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/\n| parse completion /\"message\":\"(?<tool_message>[^\"]+)\"/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Recent Tool Usage - Self-Service Actions",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 26,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id, ai_agent_id, model_id\n| filter event_type = 'TRANSCRIPT_AGENTIC_MESSAGE'\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Agentic Messages",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 26,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, session_id\n| filter event_type = 'TRANSCRIPT_AGENTIC_MESSAGE'\n| stats count(*) as agentic_steps by session_id\n| sort agentic_steps desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Agentic Loop Iterations per Session",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 32,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, model_id\n| filter event_type = 'TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION'\n| stats count(*) as invocations by model_id\n| sort invocations desc",
                "region": "${AWS::Region}",
                "title": "LLM Model Usage",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 32,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, prompt_type\n| filter event_type = 'TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION'\n| filter ispresent(prompt_type) and prompt_type != ''\n| stats count(*) as count by prompt_type\n| sort count desc",
                "region": "${AWS::Region}",
                "title": "Prompt Type Distribution",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 38,
              "width": 24,
              "height": 12,
              "properties": {
                "query": "SOURCE '${LogGroupRef}' | fields @timestamp, event_type, session_id, session_name, assistant_id, ai_agent_id, intent, recommendation_id, model_id, prompt_type, utterance, is_recommendation_useful\n| sort @timestamp desc\n| limit 50",
                "region": "${AWS::Region}",
                "title": "Comprehensive Event Log - All Connect AI Agent Events",
                "view": "table"
              }
            }
          ]
        }
      - LogGroupRef: !If
        - ShouldCreateLogGroup
        - !Ref CAIALogGroup
        - !Ref LogGroupName
  CAIALogDelivery:
    Type: AWS::CloudFormation::CustomResource
    Condition: ShouldCreateLogGroup
    Properties:
      ServiceToken: !GetAtt CAIALogDeliveryFunction.Arn
      AssistantARN: !Ref AmazonCAIAAssistantARN
      LogGroupARN: !GetAtt CAIALogGroup.Arn
      StackName: !Ref AWS::StackName

  # Lambda Function - Enhanced with better error handling and logging
  CAIALogDeliveryFunction:
    Type: AWS::Lambda::Function
    Condition: ShouldCreateLogGroup
    Properties:
      FunctionName: !Sub
      - 'AmazonCAIALogDeliveryFunction-${UUID}'
      - UUID: !Select [4, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId]]]]
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt QLogDeliveryFunctionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import logging
          from botocore.exceptions import ClientError
          import cfnresponse
          import json

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          logs_client = boto3.client('logs')
          LOG_TYPE = 'EVENT_LOGS'
          OUTPUT_FORMAT = 'json'

          def handler(event, context):
              logger.info(f"Processing {event['RequestType']} request")
              try:
                  properties = event.get('ResourceProperties', {})
                  request_type = event['RequestType']
                  
                  if request_type in ['Create', 'Update']:
                      handle_create_update(properties, event, context)
                  elif request_type == 'Delete':
                      handle_delete(properties, event, context)
                  else:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': f'Unsupported request type: {request_type}'})
              except Exception as e:
                  logger.error(f"Handler failed: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def handle_create_update(properties, event, context):
              assistant_arn = properties['AssistantARN']
              log_group_arn = properties['LogGroupARN']
              stack_name = properties['StackName']
              
              source_name = f'{stack_name}-delivery-source'
              dest_name = f'{stack_name}-delivery-destination'
              
              try:
                  source_response = logs_client.put_delivery_source(
                      name=source_name,
                      resourceArn=assistant_arn,
                      logType=LOG_TYPE,
                      tags={'Purpose': 'Connect AI Agent Logging', 'StackName': stack_name}
                  )
                  
                  dest_response = logs_client.put_delivery_destination(
                      name=dest_name,
                      outputFormat=OUTPUT_FORMAT,
                      deliveryDestinationConfiguration={'destinationResourceArn': log_group_arn},
                      tags={'Purpose': 'Connect AI Agent Logging', 'StackName': stack_name}
                  )
                  
                  delivery_response = logs_client.create_delivery(
                      deliverySourceName=source_name,
                      deliveryDestinationArn=dest_response['deliveryDestination']['arn'],
                      tags={'Purpose': 'Connect AI Agent Logging', 'StackName': stack_name}
                  )
                  
                  delivery_id = delivery_response['delivery']['id']
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'DeliveryId': delivery_id,
                      'LogType': LOG_TYPE,
                      'OutputFormat': OUTPUT_FORMAT
                  }, delivery_id)
                  
              except Exception as e:
                  logger.error(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def handle_delete(properties, event, context):
              stack_name = properties['StackName']
              delivery_id = event.get('PhysicalResourceId')
              
              try:
                  if delivery_id and delivery_id != 'None':
                      logs_client.delete_delivery(id=delivery_id)
                  
                  try:
                      logs_client.delete_delivery_destination(name=f'{stack_name}-delivery-destination')
                  except: pass
                  
                  try:
                      logs_client.delete_delivery_source(name=f'{stack_name}-delivery-source')
                  except: pass
                  
              except Exception as e:
                  logger.warning(f"Cleanup warning: {str(e)}")
              
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  # IAM Role - Enhanced with comprehensive permissions
      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
  QLogDeliveryFunctionRole:
    Type: AWS::IAM::Role
    Condition: ShouldCreateLogGroup
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: LogDeliveryAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:*
            - wisdom:*
            - iam:PassRole
            Resource: '*'

      Tags:
      - Key: Environment
        Value: NonProd
      - Key: Name
        Value: NovaVoice
      - Key: contact
        Value: askdevopscloud@spglobal.com
      - Key: AppID
        Value: ASP0017650
      - Key: CreatedBy
        Value: Abhay.Lunkad
      - Key: Owner
        Value: anuthama.c@spglobal.com
Outputs:
  DashboardURL:
    Description: URL to access the CloudWatch Dashboard for Connect AI Agent monitoring
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${CAIADashboard}

  LogGroupName:
    Description: Name of the CloudWatch Log Group storing Connect AI Agent event logs
    Value: !If
    - ShouldCreateLogGroup
    - !Ref CAIALogGroup
    - !Ref LogGroupName
  LogGroupARN:
    Description: ARN of the CloudWatch Log Group for programmatic access
    Value: !If
    - ShouldCreateLogGroup
    - !GetAtt CAIALogGroup.Arn
    - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}"
  LogGroupURL:
    Description: Direct URL to the CloudWatch Log Group
    Value: !If
    - ShouldCreateLogGroup
    - !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/${CAIALogGroup}
    - !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/${LogGroupName}
  AssistantARN:
    Description: Connect AI Agent Assistant ARN configured for logging
    Value: !Ref AmazonCAIAAssistantARN

  SupportedEventTypes:
    Description: List of supported Connect AI Agent event types
    Value: "TRANSCRIPT_AGENTIC_MESSAGE, TRANSCRIPT_CREATE_SESSION, TRANSCRIPT_INTENT_TRIGGERING_REFERENCE, TRANSCRIPT_LARGE_LANGUAGE_MODEL_INVOCATION, TRANSCRIPT_QUERY_ASSISTANT, TRANSCRIPT_RECOMMENDATION, TRANSCRIPT_RESULT_FEEDBACK, TRANSCRIPT_SELF_SERVICE_MESSAGE, TRANSCRIPT_SESSION_POLLED, TRANSCRIPT_TRIGGER_DETECTION_MODEL_INVOCATION, TRANSCRIPT_UTTERANCE"
  CommonQueries:
    Description: Common CloudWatch Insights queries for debugging
    Value: "filter session_name = \"SessionName\" | filter session_id = \"SessionId\" | filter event_type = \"TRANSCRIPT_RECOMMENDATION\""
  ToolUsageQuery:
    Description: CloudWatch Insights query to analyze tool usage patterns
    Value: "filter event_type = 'TRANSCRIPT_SELF_SERVICE_MESSAGE' and ispresent(completion) | filter completion like /toolUse/ | parse completion /\"name\":\"(?<tool_name>[^\"]+)\"/ | stats count() by tool_name"
  AgenticLoopQuery:
    Description: CloudWatch Insights query to count agentic loop iterations per session
    Value: "filter event_type = 'TRANSCRIPT_AGENTIC_MESSAGE' | stats count(*) as agentic_steps by session_id | sort agentic_steps desc"
  DeliveryId:
    Description: CloudWatch Logs delivery ID linking Connect AI Agent assistant to log group
    Condition: ShouldCreateLogGroup
    Value: !GetAtt CAIALogDelivery.DeliveryId

  LambdaFunctionName:
    Description: Name of the Lambda function handling log delivery configuration
    Condition: ShouldCreateLogGroup
    Value: !Ref CAIALogDeliveryFunction
