openapi: 3.0.1
info:
  title: Bank Rate Collection API
  description: >-
    REST API for collecting bank deposit rates (CDs, Money Market, IRA, Savings, Checking, Specials)
    on behalf of S&P Global Ratewatch. Each endpoint corresponds to one product category collected
    by the Ryan AI agent during an outbound call to a bank.
  version: 1.0.0
  contact:
    name: S&P Global Ratewatch Engineering

servers:
  - url: ${API_GATEWAY_URL}
    description: AWS API Gateway endpoint

security:
  - ApiKeyAuth: []

paths:

  # ─────────────────────────────────────────────
  # CALL SESSION
  # ─────────────────────────────────────────────
  /sessions:
    post:
      operationId: startCallSession
      summary: Start a new rate-collection call session
      description: >-
        Creates a call session record before Ryan begins collecting rates.
        Returns a sessionId used by all subsequent rate submission calls.
      tags: [Session]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bankName, phoneNumber]
              properties:
                bankName:
                  type: string
                  description: Name of the bank being called
                  example: "First National Bank"
                phoneNumber:
                  type: string
                  description: Phone number dialed (E.164)
                  example: "+15551234567"
                contactId:
                  type: string
                  description: Amazon Connect contact ID for this call
                  example: "abc12345-1234-1234-1234-abc123456789"
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                    description: Unique session identifier to use in all subsequent calls
                  message:
                    type: string

  /sessions/{sessionId}:
    get:
      operationId: getCallSession
      summary: Get current call session state
      description: Returns the current collection state for a session — useful for resuming interrupted calls.
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session state
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  bankName:
                    type: string
                  phoneNumber:
                    type: string
                  status:
                    type: string
                    enum: [in-progress, complete, incomplete, voicemail, email, dnc]
                  collectedProducts:
                    type: array
                    items:
                      type: string
                    description: List of product types already collected in this session
                  bankerName:
                    type: string
        '404':
          description: Session not found

  # ─────────────────────────────────────────────
  # RATE SUBMISSION — CD (Steps 1–4)
  # ─────────────────────────────────────────────
  # ─────────────────────────────────────────────
  # RATE SUBMISSION — UNIFIED (Steps 1–11)
  # One endpoint covers CD, Money Market, IRA, Savings, Checking, Specials.
  # The productCategory discriminator selects which product is being submitted.
  # Consolidating to one endpoint reduces the tool count in the AI Agent context
  # by ~1000 tokens per turn, which is meaningful on long calls.
  # ─────────────────────────────────────────────
  /rates:
    post:
      operationId: submitRates
      summary: Submit collected rates for one product category
      description: >-
        Single endpoint for storing rates across all product categories (Steps 1–11).
        Call once per product category per session. Required fields vary by
        `productCategory`:

          - `cd`             — requires `tier` (standard_10k|jumbo_100k) + `termRates[]`
          - `money_market`   — requires `mmType` (standard|relationship) + `tiers[]`
          - `ira`            — requires `iraType` (liquid|fixed_12mo), plus rate/apy
          - `savings`        — rate/apy at $2,500 (or notOffered=true)
          - `checking`       — rate/apy at $2,500 (or notOffered=true)
          - `special`        — full 8-field special record

        Set `notOffered: true` when the bank does not offer the product.
      tags: [Rates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, productCategory]
              properties:
                sessionId:
                  type: string
                  description: Session ID from startCallSession
                productCategory:
                  type: string
                  enum: [cd, money_market, ira, savings, checking, special]
                  description: Which product category these rates belong to
                notOffered:
                  type: boolean
                  default: false
                  description: True if the bank does not offer this product
                # CD-specific
                tier:
                  type: string
                  enum: [standard_10k, jumbo_100k]
                  description: CD deposit tier (required when productCategory=cd)
                termRates:
                  type: array
                  description: CD term rates (productCategory=cd)
                  items:
                    $ref: '#/components/schemas/TermRate'
                minimumAbove10k:
                  type: boolean
                  default: false
                jumboDiffersFromStandard:
                  type: boolean
                  default: true
                formula:
                  type: string
                  description: Formula answer for jumbo CDs (e.g., "add 10 basis points")
                # Money Market specific
                mmType:
                  type: string
                  enum: [standard, relationship]
                  description: MM type (required when productCategory=money_market)
                productName:
                  type: string
                  description: Product name (required for relationship MM)
                balanceTiers:
                  type: array
                  description: MM balance tiers (productCategory=money_market)
                  items:
                    $ref: '#/components/schemas/BalanceTierRate'
                relationshipRequirement:
                  type: string
                flatRateAllBalances:
                  type: boolean
                  default: false
                # IRA specific
                iraType:
                  type: string
                  enum: [liquid, fixed_12mo]
                  description: IRA type (required when productCategory=ira)
                # Savings / Checking / IRA common
                depositAmount:
                  type: number
                  description: Deposit amount used for rate collection
                rate:
                  type: string
                  description: Interest rate as percentage string
                  example: "0.50"
                apy:
                  type: string
                  description: APY as percentage string
                  example: "0.50"
                rateEqualsApy:
                  type: boolean
                  default: false
                # Special-specific
                specialProductType:
                  type: string
                  description: Underlying product type of the special (e.g. CD, MM)
                  example: "CD"
                term:
                  type: string
                  description: Term of the special product
                  example: "7 months"
                minimumDeposit:
                  type: number
                maximumDeposit:
                  type: number
                qualificationRequirements:
                  type: string
                iraApplicable:
                  type: boolean
                  description: Whether the special applies to IRAs
      responses:
        '200':
          description: Rates stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSuccess'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ─────────────────────────────────────────────
  # CLOSE CALL (Step 12)
  # ─────────────────────────────────────────────
  /sessions/{sessionId}/close:
    post:
      operationId: closeCallSession
      summary: Close a completed rate-collection call session
      description: >-
        Finalise the call record with the banker's name and completion type.
        Must be called before invoking the Complete RETURN_TO_CONTROL tool.
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [completionType, bankerName]
              properties:
                completionType:
                  type: string
                  enum: [full, spot_check, incomplete, voicemail, email]
                  description: How the call was completed
                bankerName:
                  type: string
                  description: Name of the banker collected at Step 12
                  example: "Sarah Johnson"
      responses:
        '200':
          description: Session closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSuccess'

  # ─────────────────────────────────────────────
  # CALLBACKS
  # ─────────────────────────────────────────────
  /callbacks:
    post:
      operationId: scheduleCallback
      summary: Schedule a callback when banker is busy
      description: >-
        Record a callback request when the banker cannot provide rates now
        and wants to be contacted at a specific time.
      tags: [Callbacks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, bankerName, callbackTime]
              properties:
                sessionId:
                  type: string
                bankerName:
                  type: string
                  example: "John Smith"
                callbackTime:
                  type: string
                  description: Requested callback time as stated by banker
                  example: "Tomorrow morning around 9 AM"
                phoneNumber:
                  type: string
                  description: Phone number to call back (defaults to original dialed number)
                  example: "+15551234567"
      responses:
        '200':
          description: Callback scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSuccess'

  # ─────────────────────────────────────────────
  # DO NOT CALL
  # ─────────────────────────────────────────────
  /dnc:
    post:
      operationId: markDNC
      summary: Mark a number as Do Not Call
      description: >-
        Record a DNC request ONLY when the banker explicitly says
        "remove my number", "stop calling", or "do not call".
        Do NOT use for general refusals.
      tags: [DNC]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, phoneNumber]
              properties:
                sessionId:
                  type: string
                phoneNumber:
                  type: string
                  description: Phone number to add to DNC list (E.164 format)
                  example: "+15551234567"
                bankerName:
                  type: string
                  description: Banker name if collected before DNC request
      responses:
        '200':
          description: DNC recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSuccess'

  # ─────────────────────────────────────────────
  # MERGER / ACQUISITION
  # ─────────────────────────────────────────────
  /merger-acquisition:
    post:
      operationId: recordMergerAcquisition
      summary: Record a bank merger or acquisition event
      description: >-
        Record when a banker reports that their bank is in a merger or acquisition.
        Capture whether it continues as a separate division or full rebrand, and the timeline.
      tags: [Merger Acquisition]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId:
                  type: string
                acquiringBank:
                  type: string
                  description: Name of the acquiring bank (if known)
                  example: "Regional Bancorp"
                continuationStatus:
                  type: string
                  enum: [separate_division, full_rebrand, unknown]
                  description: Whether the bank continues as separate division or full rebrand
                timeline:
                  type: string
                  description: Expected completion date or timeline for the M&A
                  example: "Q3 2026"
                bankerName:
                  type: string
                additionalNotes:
                  type: string
      responses:
        '200':
          description: M&A event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSuccess'

# ─────────────────────────────────────────────
# SHARED COMPONENTS
# ─────────────────────────────────────────────
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    TermRate:
      type: object
      required: [term]
      properties:
        term:
          type: string
          description: CD term (e.g., "1 month", "3 months", "12 months", "36 months")
          example: "12 months"
        rate:
          type: string
          description: Interest rate as percentage string (e.g., "1.50")
          example: "1.50"
        apy:
          type: string
          description: APY as percentage string
          example: "1.51"
        rateEqualsApy:
          type: boolean
          description: Set true if rate and APY are identical
          default: false

    BalanceTierRate:
      type: object
      required: [tier]
      properties:
        tier:
          type: string
          description: Balance tier (e.g., "$2,500", "$10,000", "$25,000", "$100,000", "$250,000")
          example: "$10,000"
        minBalance:
          type: number
          example: 10000
        maxBalance:
          type: number
          description: Upper bound (null if no cap)
          example: 24999
        rate:
          type: string
          example: "0.75"
        apy:
          type: string
          example: "0.75"
        rateEqualsApy:
          type: boolean
          default: false

    SubmitSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        sessionId:
          type: string
        message:
          type: string
          example: "CD rates stored successfully"
        productType:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: string

  responses:
    BadRequest:
      description: Bad request — missing or invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
