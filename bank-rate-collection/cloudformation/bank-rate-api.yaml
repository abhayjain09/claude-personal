  # ---------------------------------------------------------------------------
  # Custom Resource — Seed Banks Table
  # ---------------------------------------------------------------------------
  DataSeedingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBSeedingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:BatchWriteItem]
                Resource: !GetAtt BanksTable.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: 'arn:aws:s3:::*/*'
      Tags:
        - {Key: Environment, Value: NonProd}
        - {Key: Name,        Value: BankRateCollection}
    DeletionPolicy: Delete

  SeedDataFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt DataSeedingRole.Arn
      Timeout: 300
      MemorySize: 256
      Code:
        ZipFile: |
          const { DynamoDBClient } = require('@aws-sdk/client-dynamodb');
          const { DynamoDBDocumentClient, BatchWriteCommand } = require('@aws-sdk/lib-dynamodb');
          const { S3Client, GetObjectCommand } = require('@aws-sdk/client-s3');
          const https = require('https');

          const db  = DynamoDBDocumentClient.from(new DynamoDBClient({}));
          const s3  = new S3Client({});

          async function fetchData(url) {
            if (url.startsWith('s3://')) {
              const [bucket, ...parts] = url.slice(5).split('/');
              const resp = await s3.send(new GetObjectCommand({ Bucket: bucket, Key: parts.join('/') }));
              return JSON.parse(await resp.Body.transformToString());
            }
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  return fetchData(res.headers.location).then(resolve).catch(reject);
                }
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch(e) { reject(e); } });
              }).on('error', reject);
            });
          }

          exports.handler = async (event, context) => {
            const r = {
              Status: 'SUCCESS', Reason: context.logStreamName,
              PhysicalResourceId: context.logStreamName,
              StackId: event.StackId, RequestId: event.RequestId,
              LogicalResourceId: event.LogicalResourceId, Data: {}
            };
            try {
              if (event.RequestType === 'Delete') { await send(event, r); return; }
              const { TableName, SeedDataUrl } = event.ResourceProperties;
              if (!SeedDataUrl) throw new Error('SeedDataUrl is required');
              const banks = await fetchData(SeedDataUrl);
              const batchSize = 25;
              for (let i = 0; i < banks.length; i += batchSize) {
                await db.send(new BatchWriteCommand({
                  RequestItems: { [TableName]: banks.slice(i, i + batchSize).map(b => ({ PutRequest: { Item: b } })) }
                }));
              }
              r.Data = { Message: `Seeded ${banks.length} banks`, BankCount: banks.length };
            } catch (e) {
              r.Status = 'FAILED'; r.Reason = e.message;
            }
            await send(event, r);
          };

          async function send(event, body) {
            const url = require('url');
            const p = url.parse(event.ResponseURL);
            const s = JSON.stringify(body);
            return new Promise((res, rej) => {
              const req = https.request({ hostname: p.hostname, port: 443, path: p.path, method: 'PUT',
                headers: { 'content-type': '', 'content-length': s.length } }, () => res());
              req.on('error', rej);
              req.write(s); req.end();
            });
          }
      Tags:
        - {Key: Environment, Value: NonProd}
        - {Key: Name,        Value: BankRateCollection}
    DeletionPolicy: Delete

  BankDataSeeding:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt SeedDataFn.Arn
      TableName: !Ref BanksTable
      SeedDataUrl: !Ref SeedDataUrl
    DependsOn: BanksTable

