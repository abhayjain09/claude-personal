  # ---------------------------------------------------------------------------
  # Custom Resource — Retrieve API Key Value
  # ---------------------------------------------------------------------------
  ApiKeyRetrievalRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiGatewayReadKey
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: apigateway:GET
                Resource: !Sub 'arn:aws:apigateway:${AWS::Region}::/apikeys/*'
      Tags:
        - {Key: Environment, Value: NonProd}
        - {Key: Name,        Value: BankRateCollection}
    DeletionPolicy: Delete

  ApiKeyRetrievalFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt ApiKeyRetrievalRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json, boto3, cfnresponse

          def handler(event, context):
              data = {}
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  key_id = event['ResourceProperties']['ApiKeyId']
                  client = boto3.client('apigateway')
                  resp   = client.get_api_key(apiKey=key_id, includeValue=True)
                  data   = {'ApiKeyValue': resp['value']}
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, data)
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
      Tags:
        - {Key: Environment, Value: NonProd}
        - {Key: Name,        Value: BankRateCollection}
    DeletionPolicy: Delete

  ApiKeyValueRetrieval:
    Type: AWS::CloudFormation::CustomResource
    Condition: CreateOwnApiKey
    Properties:
      ServiceToken: !GetAtt ApiKeyRetrievalFn.Arn
      ApiKeyId: !Ref BankRateApiKey
    DependsOn: BankRateApiKey

