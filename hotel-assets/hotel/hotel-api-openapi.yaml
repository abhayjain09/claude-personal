openapi: 3.0.1
info:
  title: Hotel Reservation API
  description:
    REST API for hotel search, room availability, and reservation management
  version: 1.0.0
  contact:
    name: AWS Workshop Team
  license:
    name: MIT

servers:
  - url: ${API_GATEWAY_URL} # This is a variable that gets transformed.  Don't change this.
    description: AWS API Gateway endpoint

paths:
  /hotels/search:
    post:
      operationId: searchHotels
      summary: Search hotels by city
      description:
        Search for hotels in a specific city. Returns a list of available hotels
        with details like name, address, and amenities.
      tags:
        - Hotel Search
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - city
              properties:
                city:
                  type: string
                  description: The city name to search for hotels
                  example: Seattle
                state:
                  type: string
                  description: Optional state filter
                  example: WA
                country:
                  type: string
                  description: Optional country filter
                  example: USA
      responses:
        '200':
          description: List of hotels found in the specified city
          content:
            application/json:
              schema:
                type: object
                properties:
                  hotels:
                    type: array
                    items:
                      type: object
                      required:
                        - hotelId
                        - name
                        - address
                        - city
                      properties:
                        hotelId:
                          type: string
                          description: Unique identifier for the hotel
                          example: hotel-123
                        name:
                          type: string
                          description: Hotel name
                          example: Grand Plaza Hotel
                        address:
                          type: string
                          description: Hotel address
                          example: '123 Main St, Seattle, WA 98101'
                        city:
                          type: string
                          description: City where hotel is located
                          example: Seattle
                        rating:
                          type: number
                          format: float
                          minimum: 1
                          maximum: 5
                          description: Hotel rating (1-5 stars)
                          example: 4.5
                        amenities:
                          type: array
                          items:
                            type: string
                          description: List of hotel amenities
                          example: ['WiFi', 'Pool', 'Gym', 'Restaurant']
                  count:
                    type: integer
                    description: Number of hotels found
                  city:
                    type: string
                    description: City that was searched
              example:
                hotels:
                  - hotelId: 'hotel-123'
                    name: 'Grand Plaza Hotel'
                    address: '123 Main St, Seattle, WA 98101'
                    city: 'Seattle'
                    rating: 4.5
                    amenities: ['WiFi', 'Pool', 'Gym', 'Restaurant']
                count: 1
                city: 'Seattle'
        '400':
          description: Bad request - missing or invalid city parameter
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    description: Error message
                    example: Invalid request parameters
                  code:
                    type: string
                    description: Error code
                    example: INVALID_PARAMETERS
                  details:
                    type: string
                    description: Additional error details
                    example: The city parameter is required
        '401':
          description: Unauthorized - API key required
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    description: Error message
                    example: Invalid request parameters
        '404':
          description: No hotels found in the specified city
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    description: Error message
                    example: Invalid request parameters

  /reservations:
    post:
      operationId: createBooking
      summary: Create new reservation
      description:
        Create a new hotel reservation. This will book a room for the specified
        dates and return a confirmation number.
      tags:
        - Booking Management
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hotelId
                - customerId
                - checkInDate
                - checkOutDate
                - roomType
                - guestName
                - guestEmail
              properties:
                hotelId:
                  type: string
                  description: Hotel ID where the reservation should be made
                  example: hotel-chicago-001
                customerId:
                  type: string
                  description: Customer ID making the reservation
                  example: 84c06ff4ad2440899cbd91eac98f2ca9
                checkInDate:
                  type: string
                  format: date
                  description: Check-in date in YYYY-MM-DD format
                  example: '2024-03-15'
                checkOutDate:
                  type: string
                  format: date
                  description: Check-out date in YYYY-MM-DD format
                  example: '2024-03-18'
                roomType:
                  type: string
                  description: Type of room to book
                  example: Standard King
                guestName:
                  type: string
                  description: Name of the primary guest
                  example: John Doe
                guestEmail:
                  type: string
                  format: email
                  description: Email address of the primary guest
                  example: john.doe@example.com
                numberOfGuests:
                  type: integer
                  description: Number of guests
                  example: 2
                specialRequests:
                  type: string
                  description: Any special requests or notes
                  example: Late check-in requested
      responses:
        '201':
          description: Reservation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the booking was successful
                    example: true
                  reservationId:
                    type: string
                    description: Unique reservation identifier
                    example: RES-ABC123
                  confirmationNumber:
                    type: string
                    description: Customer-facing confirmation number
                    example: ABC123XY
                  status:
                    type: string
                    description: Reservation status
                    example: CONFIRMED
                  message:
                    type: string
                    description: Success or error message
                    example: Reservation created successfully
        '401':
          description: Unauthorized - API key required
        '400':
          description: Bad request - invalid or missing parameters
        '409':
          description: Conflict - room not available for specified dates

  /reservations/cancel:
    post:
      operationId: cancelReservation
      summary: Cancel a reservation
      description:
        Cancel an existing reservation. This will update the reservation status
        to cancelled and process any applicable refunds.
      tags:
        - Booking Management
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reservationId
              properties:
                reservationId:
                  type: string
                  description: Unique reservation identifier to cancel
                  example: RES-ABC123
      responses:
        '200':
          description: Reservation cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Reservation cancelled successfully
                  reservation:
                    type: object
                    properties:
                      reservationId:
                        type: string
                        example: RES-ABC123
                      status:
                        type: string
                        example: CANCELLED
                      cancelledAt:
                        type: string
                        format: date-time
                        example: '2024-01-20T15:30:00Z'
        '401':
          description: Unauthorized - API key required
        '400':
          description: Bad request - missing reservationId parameter
        '404':
          description: Reservation not found

  /reservations/customer:
    post:
      operationId: getCustomerReservations
      summary: Get all reservations for a customer
      description:
        Retrieve all reservations for a specific customer. Use this to check
        existing bookings before making changes or to provide customer service.
      tags:
        - Customer Service
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customerId
              properties:
                customerId:
                  type: string
                  description: The customer ID to look up reservations for
                  example: 84c06ff4ad2440899cbd91eac98f2ca9
      responses:
        '200':
          description: List of customer reservations
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations:
                    type: array
                    items:
                      type: object
                      properties:
                        reservationId:
                          type: string
                          description: Unique reservation identifier
                          example: RES-ABC123
                        hotelId:
                          type: string
                          description: Hotel identifier
                          example: hotel-123
                        customerId:
                          type: string
                          description: Customer identifier
                          example: 84c06ff4ad2440899cbd91eac98f2ca9
                        checkInDate:
                          type: string
                          format: date
                          description: Check-in date
                          example: '2024-03-15'
                        checkOutDate:
                          type: string
                          format: date
                          description: Check-out date
                          example: '2024-03-18'
                        roomType:
                          type: string
                          description: Type of room booked
                          example: Standard King
                        guestName:
                          type: string
                          description: Primary guest name
                          example: John Doe
                        guestEmail:
                          type: string
                          format: email
                          description: Guest email address
                          example: john.doe@example.com
                        numberOfGuests:
                          type: integer
                          description: Number of guests
                          example: 2
                        status:
                          type: string
                          enum: [confirmed, cancelled]
                          description: Current reservation status
                          example: confirmed
                        createdAt:
                          type: string
                          format: date-time
                          description: When the reservation was created
                          example: '2024-01-15T10:30:00Z'
                        totalAmount:
                          type: number
                          description: Total cost of the reservation
                          example: 360.00
                  count:
                    type: integer
                    description: Number of reservations found
                  customerId:
                    type: string
                    description: Customer ID that was searched
        '401':
          description: Unauthorized - API key required
        '400':
          description: Bad request - missing customerId parameter
        '404':
          description: No reservations found for the customer

  /reservations/modify:
    post:
      operationId: modifyReservation
      summary: Modify an existing reservation
      description:
        Update details of an existing reservation such as check-in/check-out
        dates or room type. Requires both reservationId and customerId for
        security verification.
      tags:
        - Booking Management
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reservationId
                - customerId
              properties:
                reservationId:
                  type: string
                  description: Unique reservation identifier to modify
                  example: RES-ABC123
                customerId:
                  type: string
                  description: Customer ID for verification
                  example: 84c06ff4ad2440899cbd91eac98f2ca9
                checkInDate:
                  type: string
                  format: date
                  description: New check-in date (optional)
                  example: '2024-03-16'
                checkOutDate:
                  type: string
                  format: date
                  description: New check-out date (optional)
                  example: '2024-03-19'
                roomType:
                  type: string
                  description: New room type (optional)
                  example: Deluxe Suite
      responses:
        '200':
          description: Reservation modified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Reservation modified successfully
                  reservation:
                    type: object
                    properties:
                      reservationId:
                        type: string
                        example: RES-ABC123
                      hotelId:
                        type: string
                        example: hotel-123
                      customerId:
                        type: string
                        example: 84c06ff4ad2440899cbd91eac98f2ca9
                      checkInDate:
                        type: string
                        format: date
                        example: '2024-03-16'
                      checkOutDate:
                        type: string
                        format: date
                        example: '2024-03-19'
                      roomType:
                        type: string
                        example: Deluxe Suite
                      modifiedAt:
                        type: string
                        format: date-time
                        example: '2024-01-20T16:45:00Z'
        '401':
          description: Unauthorized - API key required
        '400':
          description: Bad request - missing required parameters
        '404':
          description: Reservation not found or customer ID mismatch

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

security:
  - ApiKeyAuth: []

tags:
  - name: Hotel Search
    description: Operations for searching and discovering hotels
  - name: Customer Service
    description: Operations for customer service and support
  - name: Booking Management
    description: Operations for creating, modifying, and cancelling reservations
